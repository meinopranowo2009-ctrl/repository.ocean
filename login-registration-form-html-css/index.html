<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LautKita.web</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HALAMAN UTAMA WEBSITE -->
    <main id="homePage" class="page">
      <header class="main-header">
        <h1>Selamat Datang di LautKita.web</h1>
        <p>Portal informasi, edukasi, dan kepedulian terhadap laut Indonesia.</p>

        <nav>
          <a href="/">Beranda</a>
          <a href="/login">Login</a>
        </nav>
      </header>

      <section class="content">
        <h2>Tentang LautKita</h2>
        <p>
          LautKita.web adalah website yang berisi informasi tentang laut,
          ekosistem pesisir, oseanografi, dan edukasi lingkungan maritim.
        </p>
      </section>
    </main>

    <!-- HALAMAN LOGIN DAN SIGNUP -->
    <section id="loginPage" class="wrapper">
      <div class="form signup">
        <header>Signup</header>

        <form action="#" method="post">
          <input type="text" placeholder="Full name" required />
          <input type="email" placeholder="Email address" required />
          <input type="password" placeholder="Password" required />

          <div class="checkbox">
            <input type="checkbox" id="signupCheck" required />
            <label for="signupCheck">I accept all terms & conditions</label>
          </div>

          <input type="submit" value="Signup" />
        </form>
      </div>

      <div class="form login">
        <header>Login</header>

        <form action="#" method="post">
          <input type="email" placeholder="Email address" required />
          <input type="password" placeholder="Password" required />
          <a href="#">Forgot password?</a>
          <input type="submit" value="Login" />
        </form>
      </div>
    </section>

    <script>
      const homePage = document.getElementById("homePage");
      const loginPage = document.getElementById("loginPage");

      const wrapper = document.querySelector(".wrapper");
      const signupHeader = document.querySelector(".signup header");
      const loginHeader = document.querySelector(".login header");

      /*
        Mengecek URL:
        - Jika URL mengandung /login, tampilkan halaman login
        - Jika tidak, tampilkan halaman utama
      */

      if (window.location.pathname.includes("login")) {
        homePage.style.display = "none";
        loginPage.style.display = "block";
      } else {
        homePage.style.display = "block";
        loginPage.style.display = "none";
      }

      loginHeader.addEventListener("click", () => {
        wrapper.classList.add("active");
      });

      signupHeader.addEventListener("click", () => {
        wrapper.classList.remove("active");
      });
    </script>
  </body>
</html>
